# B6 LLaMA-Pro baseline config for Paper B
#
# Mirrors configs/paper_b.yaml exactly (same dataset, same scale, same seeds)
# so the INCA vs LLaMA-Pro comparison is apples-to-apples.
#
# LLaMA-Pro behaviour implemented in baselines/b6_llama_pro.py:
#   Period 0  : freeze all; unfreeze last 1 encoder block (initial_trainable_blocks=1)
#   Period N>0: deepcopy last block → zero output projections → append → freeze all →
#               unfreeze new last block
#   No saturation signal — expansion fires at every period boundary (fixed schedule).
#
# Usage:
#   python baselines/b6_llama_pro.py \
#       --config configs/baselines/b6_paper_b.yaml \
#       --initial_trainable_blocks 1

# ── Model ─────────────────────────────────────────────────────────────────────
model_name:  "google/flan-t5-large"      # 780 M — matches INCA config for apples-to-apples comparison

# ── Dataset (must match configs/paper_b.yaml exactly) ────────────────────────
dataset:       "domain_sequential"
n_per_period:  30000                      # must match INCA configs for apples-to-apples comparison
max_periods:   4                          # P1_metamath → P2_evol_code → P3_science → P4_medical

# ── Training (must match configs/paper_b.yaml exactly) ───────────────────────
lr:                  1.0e-4               # standard FLAN-T5-large AdamW LR; fp32 MPS is stable at this
weight_decay:        0.01
batch_size:          4                    # reduced for flan-t5-large + long sequences; effective batch = 4 × 8 = 32
epochs_per_period:   5
warmup_steps:        200                  # warmup to 1e-4 over 200 steps
warmup_ratio:        0.06
grad_accum_steps:    8                    # increased to maintain effective batch = 32
max_grad_norm:       1.0                  # standard FLAN-T5 clipping; fp16 NaN (former instability cause) is fixed
gradient_checkpointing: false  # must be false: B6 freezes all-but-one block; GC + frozen params breaks backward
use_adafactor:       false
ppl_eval_frac:       0.10
seed:                42
fp16:                false
log_every_n_steps:   25
max_input_length:    256
max_target_length:   0                    # 0 = auto: P95 token length scanned from data at startup
max_new_tokens:      512                  # full generation: covers MetaMath chain-of-thought + answer

# ── B6-specific ───────────────────────────────────────────────────────────────
# initial_trainable_blocks is passed via CLI; 1 is the LLaMA-Pro default.
# All other INCA-specific keys (rir_threshold, patience, cka_*, …) are ignored
# by b6_llama_pro.py but kept here so INCAConfig can parse the file.
n_max_blocks:           8
k_eval:                 25
patience:               3
min_epochs_before_grow: 1
layers_per_block:       4                 # flan-t5-large: 24 enc layers → max 6 blocks
lateral_rank:           0
rir_threshold:          0.30
rir_negligible:         0.05
grad_norm_ema_alpha:    0.10
grad_norm_decay_frac:   0.50
cka_ref_size:           100
cka_saturation_threshold: 0.95
buffer_max_size:        2000
replay_ratio:           0.25
n_revise:               3
p_hard:                 0.70
p_easy:                 0.20
p_mid:                  0.10
period_drift_tol:       0.10
min_rir_for_learned:    0.20
selector:               "embedding_query"
selector_heads:         4
selector_hidden:        64
uclbr_pre_gate_hidden:  64
uclbr_heads:            4
uclbr_bias_lr:          1.0e-3
uclbr_top_k:            0

# ── Eval speed ────────────────────────────────────────────────────────────────
eval_batch_size:    32
sat_eval_samples:   200
# sat_max_new_tokens removed — saturation checks now use max_new_tokens

# ── Output ────────────────────────────────────────────────────────────────────
out_dir: "results/paper_b/b6"
