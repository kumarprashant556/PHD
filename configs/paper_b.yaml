# Paper B primary training config — INCA vs LLaMA-Pro on domain-sequential curriculum
# Inherits the INCA architecture spec from configs/inca.yaml; overrides dataset + scale.
#
# Dataset: 3 domains  (math → code → science)
#   P1_math     lighteval/MATH         ~12 500 examples → subsampled to n_per_period
#   P2_code     bigcode/the-stack-smol ~200 k Python    → subsampled to n_per_period
#   P3_science  allenai/sciq           ~13 700 examples → subsampled to n_per_period
#
# Resource target: full 3-domain × 3-seed sweep (9 INCA runs + 9 B6 runs = 18 total)
# in ≤ 6 hours on a single M-series Mac or 1× A100 40 GB.
#
# Usage:
#   python scripts/train_inca.py    --config configs/paper_b.yaml
#   python baselines/b6_llama_pro.py --config configs/baselines/b6_paper_b.yaml

# ── Model ─────────────────────────────────────────────────────────────────────
model_name: "google/flan-t5-base"        # 250 M encoder-decoder (12 enc + 12 dec layers)

# ── Dataset ───────────────────────────────────────────────────────────────────
dataset:       "domain_sequential"        # data/domain_sequential.py
n_per_period:  2000                       # small — resource-constrained; enough for saturation
max_periods:   3                          # P1_math, P2_code, P3_science
split_frac:    0.50                       # completion framing: encoder = first half of text

# ── Training ──────────────────────────────────────────────────────────────────
lr:                  3.0e-4
weight_decay:        0.01
batch_size:          8                    # MPS-safe; effective batch = 8 × 4 = 32
epochs_per_period:   3                    # fewer epochs needed (small n_per_period)
warmup_steps:        100
warmup_ratio:        0.06
grad_accum_steps:    4
max_grad_norm:       1.0
gradient_checkpointing: true
use_adafactor:       false
ppl_eval_frac:       0.10                 # larger eval fraction (small dataset)
seed:                42
fp16:                false
log_every_n_steps:   25
max_input_length:    256
max_target_length:   256

# ── INCA block-chain growth ───────────────────────────────────────────────────
n_max_blocks:           8
k_eval:                 25                # check saturation every 25 opt steps (small data)
patience:               3                 # tighter plateau patience (fewer steps/epoch)
min_epochs_before_grow: 1                 # allow growth after 1 epoch (small domain)
layers_per_block:       4                 # flan-t5-base: 12 enc layers → max 3 blocks
lateral_rank:           0                 # Phase 1 (no lateral adapters in main paper)

# ── Multi-signal consensus ────────────────────────────────────────────────────
rir_threshold:        0.30
rir_negligible:       0.05
grad_norm_ema_alpha:  0.10
grad_norm_decay_frac: 0.50

# ── CKA ───────────────────────────────────────────────────────────────────────
cka_ref_size:             100             # smaller (n_per_period=2000; 100 is ≥5%)
cka_saturation_threshold: 0.95

# ── Replay ────────────────────────────────────────────────────────────────────
buffer_max_size: 500                      # proportional to n_per_period (was 2000 for 20k)
replay_ratio:    0.25
n_revise:        3
p_hard:          0.70
p_easy:          0.20
p_mid:           0.10

# ── Drift & relabelling ───────────────────────────────────────────────────────
period_drift_tol:    0.10
min_rir_for_learned: 0.20

# ── Selector (default: S-QKV; overridden by E-ROUTE ablation) ─────────────────
selector:        "embedding_query"
selector_heads:  4
selector_hidden: 64

uclbr_pre_gate_hidden: 64
uclbr_heads:           4
uclbr_bias_lr:         1.0e-3
uclbr_top_k:           0

# ── Output ────────────────────────────────────────────────────────────────────
out_dir: "results/paper_b"
