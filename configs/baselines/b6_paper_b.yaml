# B6 LLaMA-Pro baseline config for Paper B
#
# Mirrors configs/paper_b.yaml exactly (same dataset, same scale, same seeds)
# so the INCA vs LLaMA-Pro comparison is apples-to-apples.
#
# LLaMA-Pro behaviour implemented in baselines/b6_llama_pro.py:
#   Period 0  : freeze all; unfreeze last 1 encoder block (initial_trainable_blocks=1)
#   Period N>0: deepcopy last block → zero output projections → append → freeze all →
#               unfreeze new last block
#   No saturation signal — expansion fires at every period boundary (fixed schedule).
#
# Usage:
#   python baselines/b6_llama_pro.py \
#       --config configs/baselines/b6_paper_b.yaml \
#       --initial_trainable_blocks 1

# ── Model ─────────────────────────────────────────────────────────────────────
model_name:  "google/flan-t5-base"

# ── Dataset (must match configs/paper_b.yaml exactly) ────────────────────────
dataset:       "domain_sequential"
n_per_period:  2000
max_periods:   3
split_frac:    0.50

# ── Training (must match configs/paper_b.yaml exactly) ───────────────────────
lr:                  3.0e-4
weight_decay:        0.01
batch_size:          8
epochs_per_period:   3
warmup_steps:        100
warmup_ratio:        0.06
grad_accum_steps:    4
max_grad_norm:       1.0
gradient_checkpointing: true
use_adafactor:       false
ppl_eval_frac:       0.10
seed:                42
fp16:                false
log_every_n_steps:   25
max_input_length:    256
max_target_length:   256

# ── B6-specific ───────────────────────────────────────────────────────────────
# initial_trainable_blocks is passed via CLI; 1 is the LLaMA-Pro default.
# All other INCA-specific keys (rir_threshold, patience, cka_*, …) are ignored
# by b6_llama_pro.py but kept here so INCAConfig can parse the file.
n_max_blocks:           8
k_eval:                 25
patience:               3
min_epochs_before_grow: 1
layers_per_block:       4
lateral_rank:           0
rir_threshold:          0.30
rir_negligible:         0.05
grad_norm_ema_alpha:    0.10
grad_norm_decay_frac:   0.50
cka_ref_size:           100
cka_saturation_threshold: 0.95
buffer_max_size:        500
replay_ratio:           0.25
n_revise:               3
p_hard:                 0.70
p_easy:                 0.20
p_mid:                  0.10
period_drift_tol:       0.10
min_rir_for_learned:    0.20
selector:               "embedding_query"
selector_heads:         4
selector_hidden:        64
uclbr_pre_gate_hidden:  64
uclbr_heads:            4
uclbr_bias_lr:          1.0e-3
uclbr_top_k:            0

# ── Output ────────────────────────────────────────────────────────────────────
out_dir: "results/paper_b/b6"
